name: Zara Stok Kontrol Projesi

on:
  schedule:
    # GitHub Cron UTC saatini kullanır. Bu komut "Her 10 dakikada bir çalıştır" demektir.
    - cron: '*/10 * * * *'
  workflow_dispatch: # İstediğin zaman elle (manuel) başlatabilmen için buton ekler

jobs:
  zara-kontrol:
    runs-down: ubuntu-latest
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Chrome ve Sürücülerini Hazırla
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Gerekli Python Kütüphanelerini Yükle
      run: |
        python -m pip install --upgrade pip
        pip install selenium requests webdriver-manager

    - name: Botu Ateşle
      env:
        # Az önce Secrets'a eklediğimiz şifreleri sunucuya tanıtıyoruz
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python zara_bot.py
