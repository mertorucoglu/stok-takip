name: Zara Stok Kontrol Projesi

on:
  schedule:
    # Her 10 dakikada bir otomatik çalışır (UTC saatine göre)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Elle başlatma butonunu aktif eder

jobs:
  zara-kontrol:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Chrome ve Sürücülerini Hazırla
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Gerekli Python Kütüphanelerini Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests undetected-chromedriver    

    - name: Botu Ateşle
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python zara_bot.py
